<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRツイン リーダー</title>
    <script src="https://unpkg.com/@zxing/library@0.21.0/umd/index.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center;
        }
        h2 { margin: 15px 0; font-size: 1.2rem; }
        
        /* 起動画面 */
        #startScreen {
            padding: 20px;
            margin-top: 50px;
        }

        .camera-container {
            position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000;
            display: none; /* 初期状態では隠す */
        }
        video {
            width: 100%; display: block; object-fit: cover;
        }
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }
        .status-panel {
            padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left; max-width: 600px; margin: 0 auto;
            display: none; /* 初期状態では隠す */
        }
        .qr-result {
            margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c;
        }
        .qr-1 { border-left: 5px solid #00E676; }
        .qr-2 { border-left: 5px solid #29B6F6; }
        
        button {
            width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold; 
            background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        button:active { background: #3700B3; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        #resetBtn { display: none; max-width: 100%; background: #03DAC6; color: #000; }
        #resetBtn:active { background: #018786; }
    </style>
</head>
<body>

    <h2>📱 QRツイン リーダー</h2>
    
    <div id="startScreen">
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">
            2つのQRコードを同時に、または連続して読み取ります。
        </p>
        <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
    </div>

    <div class="camera-container" id="cameraContainer">
        <video id="video" playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="status-panel" id="statusPanel">
        <div id="detectorInfo" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">読取エンジン準備中...</div>
        
        <div id="result1" class="qr-result qr-1">
            <strong>1個目:</strong> <span id="text1">未検出</span>
        </div>
        <div id="result2" class="qr-result qr-2">
            <strong>2個目:</strong> <span id="text2">未検出</span>
        </div>

        <button id="resetBtn" onclick="resetScanner()">🔄 もう一度スキャンする</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let isProcessing = false;
    let isScanning = false;
    
    let useNativeDetector = false;
    let barcodeDetector = null;
    let zxingMultiReader = null;

    let firstQR = null;
    let secondQR = null;

    // 「カメラを起動する」ボタンを押したときの処理
    async function startApp() {
        const startBtn = document.getElementById('startBtn');
        startBtn.disabled = true;
        startBtn.innerText = "準備中...";

        await initEngines();
        const success = await startCamera();
        
        if (success) {
            // UIの切り替え
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('cameraContainer').style.display = 'block';
            document.getElementById('statusPanel').style.display = 'block';
        } else {
            startBtn.disabled = false;
            startBtn.innerText = "📷 カメラを起動する";
        }
    }

    // 読み取りエンジンの初期化
    async function initEngines() {
        if ('BarcodeDetector' in window) {
            try {
                const formats = await BarcodeDetector.getSupportedFormats();
                if (formats.includes('qr_code')) {
                    barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
                    useNativeDetector = true;
                    document.getElementById('detectorInfo').innerText = "⚡ エンジン: BarcodeDetector (Native)";
                    return;
                }
            } catch (e) {
                console.warn("BarcodeDetectorの初期化失敗", e);
            }
        }
        
        // フォールバック
        zxingMultiReader = new ZXing.qrcode.QRCodeMultiReader();
        document.getElementById('detectorInfo').innerText = "🐢 エンジン: ZXing (decodeMultiple)";
    }

    // カメラの取得
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;
            
            return new Promise((resolve) => {
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    isScanning = true;
                    requestAnimationFrame(scanLoop);
                    resolve(true);
                }, { once: true });
            });
        } catch (err) {
            alert("カメラへのアクセスが拒否されたか、エラーが発生しました。\nブラウザのカメラ権限を確認してください。");
            return false;
        }
    }

    // 幾何計算用の関数群
    function getCenter(points) {
        if (!points || points.length === 0) return { x: 0, y: 0 };
        let sumX = 0, sumY = 0;
        points.forEach(p => { sumX += p.x; sumY += p.y; });
        return { x: sumX / points.length, y: sumY / points.length };
    }

    function getDistance(p1, p2) {
        return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    // スキャンのメインループ
    async function scanLoop() {
        if (!isScanning) return;

        if (firstQR && secondQR) {
            document.getElementById('resetBtn').style.display = 'block';
            isScanning = false;
            return;
        }

        if (!isProcessing && video.readyState === video.HAVE_ENOUGH_DATA) {
            isProcessing = true;
            
            if (canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let detectedItems = [];

            try {
                if (useNativeDetector) {
                    const barcodes = await barcodeDetector.detect(canvas);
                    detectedItems = barcodes.map(b => ({
                        text: b.rawValue,
                        points: b.cornerPoints,
                        center: getCenter(b.cornerPoints)
                    }));
                } else {
                    const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
                    const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
                    const hints = new Map();
                    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
                    
                    const results = zxingMultiReader.decodeMultiple(binaryBitmap, hints);
                    detectedItems = results.map(r => {
                        const pts = r.getResultPoints().map(p => ({ x: p.getX(), y: p.getY() }));
                        return { text: r.getText(), points: pts, center: getCenter(pts) };
                    });
                }
            } catch (err) {}

            processDetections(detectedItems);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
            if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

            isProcessing = false;
        }
        requestAnimationFrame(scanLoop);
    }

    function processDetections(items) {
        if (items.length === 0) return;
        const distanceThreshold = canvas.width * 0.25;

        for (const item of items) {
            if (!firstQR) {
                firstQR = item;
                document.getElementById('text1').innerText = item.text;
                continue;
            }
            if (!secondQR) {
                const dist = getDistance(firstQR.center, item.center);
                if (dist > distanceThreshold) {
                    secondQR = item;
                    document.getElementById('text2').innerText = item.text;
                    break; 
                } else {
                    firstQR.points = item.points;
                    firstQR.center = item.center;
                }
            }
        }
    }

    function drawBoundingBox(points, color) {
        if (!points || points.length < 3) return;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.closePath();
        ctx.lineWidth = 6;
        ctx.strokeStyle = color;
        ctx.stroke();
        ctx.fillStyle = color + '33';
        ctx.fill();
    }

    function resetScanner() {
        firstQR = null;
        secondQR = null;
        document.getElementById('text1').innerText = "未検出";
        document.getElementById('text2').innerText = "未検出";
        document.getElementById('resetBtn').style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        isScanning = true;
        requestAnimationFrame(scanLoop);
    }
</script>
</body>
</html>
