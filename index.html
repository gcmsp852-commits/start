<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Simple QR Reader</title>
  <style>
    body{margin:0;font-family:system-ui;background:#0f111a;color:#e8eef7}
    header{padding:12px 14px;background:#171a26;border-bottom:1px solid #2a3348}
    main{padding:14px;display:grid;gap:12px;max-width:900px;margin:0 auto}
    .panel{background:#171a26;border:1px solid #2a3348;border-radius:12px;padding:12px}
    button{width:100%;padding:12px;border-radius:10px;border:1px solid #2a3348;background:#0c0f18;color:#e8eef7;font-weight:700;cursor:pointer}
    button.primary{
  border-color:#ff4d4d;
  background:linear-gradient(135deg,#ff4d4d,#b91c1c);
  color:#ffffff;
}
    button:disabled{opacity:.5;cursor:not-allowed}
    .camwrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid #2a3348;background:#000;aspect-ratio:3/4}
    video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    pre{white-space:pre-wrap;word-break:break-word;margin:0}
    .muted{color:#9fb0c7;font-size:12px;line-height:1.4}
  </style>
</head>
<body>
<header>
  <div><b>Simple QR Reader</b></div>
  <div class="muted" id="status">status: idle</div>
</header>

<main>
  <div class="panel">
    <button class="primary" id="btnStart">📷 カメラ開始</button>
    <button id="btnStop" disabled>⏹ 停止</button>
    <div class="muted" style="margin-top:10px">
      ※スマホは <b>HTTPS</b> で開いてください（file:// だとカメラ不可）<br>
      ※まずは「普通のQRコード」を読めるところまで確認します
    </div>
  </div>

  <div class="panel">
    <div class="camwrap">
      <video id="video" playsinline muted></video>
    </div>
  </div>

  <div class="panel">
    <div class="muted">読み取り結果</div>
    <pre id="out">-</pre>
  </div>
</main>

<script>
const $ = (id)=>document.getElementById(id);
const video = $("video");
const out = $("out");
const statusEl = $("status");
let stream = null;
let rafId = null;

// BarcodeDetector が使える端末はそれが最も簡単
let detector = null;

function setStatus(s){ statusEl.textContent = "status: " + s; }

async function startCamera(){
  if(!navigator.mediaDevices?.getUserMedia){
    throw new Error("getUserMediaが利用できません。HTTPSで開いてください。");
  }

  // 既存ストリームがあれば停止
  stopCamera();

  // 背面カメラ優先
  stream = await navigator.mediaDevices.getUserMedia({
    audio:false,
    video:{
      facingMode:{ ideal:"environment" }
    }
  });

  video.srcObject = stream;

  await new Promise((resolve)=>{
    video.onloadedmetadata = ()=>resolve();
    setTimeout(resolve, 800);
  });

  await video.play();
}

function stopCamera(){
  if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }
  video.srcObject = null;
  setStatus("idle");
}

function getFrameCanvas(){
  const c = document.createElement("canvas");
  const vw = video.videoWidth, vh = video.videoHeight;
  c.width = vw; c.height = vh;
  const ctx = c.getContext("2d");
  ctx.drawImage(video, 0, 0, vw, vh);
  return c;
}

async function tick(){
  rafId = requestAnimationFrame(tick);
  if(!stream || !detector) return;

  // 端末負荷軽減：毎フレームやらずに間引き
  // （ここは必要なら調整）
  const canvas = getFrameCanvas();
  const bmp = await createImageBitmap(canvas);

  try{
    const codes = await detector.detect(bmp);
    if(codes && codes.length){
      const text = codes[0].rawValue || "";
      out.textContent = text || "(empty)";
      setStatus("decoded");
    }else{
      setStatus("running");
    }
  }catch(e){
    // たまに失敗する端末があるので握りつぶす
    setStatus("running");
  }
}

$("btnStart").addEventListener("click", async ()=>{
  try{
    out.textContent = "-";
    setStatus("starting...");

    // BarcodeDetector初期化
    if("BarcodeDetector" in window){
      detector = new BarcodeDetector({ formats:["qr_code"] });
    }else{
      detector = null;
      throw new Error("この端末はBarcodeDetector非対応です。次ステップでZXing版にします。");
    }

    await startCamera();

    $("btnStart").disabled = true;
    $("btnStop").disabled = false;

    tick();
  }catch(e){
    alert(e.message || e);
    stopCamera();
  }
});

$("btnStop").addEventListener("click", ()=>{
  stopCamera();
  $("btnStart").disabled = false;
  $("btnStop").disabled = true;
});
</script>
</body>

</html>
