<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRツイン リーダー</title>
    <script src="https://unpkg.com/@zxing/library@0.21.0/umd/index.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center;
        }
        h2 { margin: 15px 0; font-size: 1.2rem; }
        .camera-container {
            position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000;
        }
        video {
            width: 100%; display: block; object-fit: cover;
        }
        /* キャンバスはビデオの上に被せて、枠線を描画する */
        canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }
        .status-panel {
            padding: 15px; background: #1e1e1e; border-top: 1px solid #333; text-align: left; max-width: 600px; margin: 0 auto;
        }
        .qr-result {
            margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c;
        }
        .qr-1 { border-left: 5px solid #00E676; }
        .qr-2 { border-left: 5px solid #29B6F6; }
        button {
            width: 100%; padding: 15px; font-size: 1rem; font-weight: bold; background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        button:active { background: #3700B3; }
    </style>
</head>
<body>

    <h2>📱 QRツイン リーダー</h2>
    
    <div class="camera-container">
        <video id="video" playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="status-panel">
        <div id="detectorInfo" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">読取エンジン準備中...</div>
        
        <div id="result1" class="qr-result qr-1">
            <strong>QR 1個目:</strong> <span id="text1">未検出</span>
        </div>
        <div id="result2" class="qr-result qr-2">
            <strong>QR 2個目:</strong> <span id="text2">未検出</span>
        </div>

        <button id="resetBtn" style="display: none;" onclick="resetScanner()">もう一度スキャンする</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let isProcessing = false;
    let isScanning = false;
    
    // エンジン関連
    let useNativeDetector = false;
    let barcodeDetector = null;
    let zxingMultiReader = null;

    // 検出状態
    let firstQR = null;
    let secondQR = null;

    // 初期化とカメラ起動
    async function init() {
        // A) BarcodeDetectorが使えるか判定
        if ('BarcodeDetector' in window) {
            try {
                const formats = await BarcodeDetector.getSupportedFormats();
                if (formats.includes('qr_code')) {
                    barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
                    useNativeDetector = true;
                    document.getElementById('detectorInfo').innerText = "⚡ エンジン: BarcodeDetector (Native)";
                }
            } catch (e) {
                console.warn("BarcodeDetectorの初期化に失敗、ZXingにフォールバックします。", e);
            }
        }
        
        // B) 使えなければ ZXing (QRCodeMultiReader) を初期化
        if (!useNativeDetector) {
            zxingMultiReader = new ZXing.qrcode.QRCodeMultiReader();
            document.getElementById('detectorInfo').innerText = "🐢 エンジン: ZXing (decodeMultiple)";
        }

        startCamera();
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;
            
            video.addEventListener('loadedmetadata', () => {
                video.play();
                // Canvasの解像度をビデオフレームの解像度に合わせる
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                isScanning = true;
                requestAnimationFrame(scanLoop);
            });
        } catch (err) {
            alert("カメラへのアクセスが拒否されたか、エラーが発生しました: " + err.message);
        }
    }

    // 幾何計算: 頂点配列から中心座標(cx, cy)を計算
    function getCenter(points) {
        if (!points || points.length === 0) return { x: 0, y: 0 };
        let sumX = 0, sumY = 0;
        points.forEach(p => { sumX += p.x; sumY += p.y; });
        return { x: sumX / points.length, y: sumY / points.length };
    }

    // 幾何計算: 2点間の距離
    function getDistance(p1, p2) {
        return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    // スキャンループ
    async function scanLoop() {
        if (!isScanning) return;

        // 両方揃ったらスキャン停止
        if (firstQR && secondQR) {
            document.getElementById('resetBtn').style.display = 'block';
            isScanning = false;
            return;
        }

        if (!isProcessing && video.readyState === video.HAVE_ENOUGH_DATA) {
            isProcessing = true;
            
            // 映像サイズが変わった場合の追従
            if (canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            // 解析用に現在のフレームをCanvasに描画
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let detectedItems = [];

            try {
                if (useNativeDetector) {
                    // ----------------------------------------------------
                    // A) BarcodeDetector アプローチ
                    // ----------------------------------------------------
                    const barcodes = await barcodeDetector.detect(canvas);
                    detectedItems = barcodes.map(b => ({
                        text: b.rawValue,
                        points: b.cornerPoints,
                        center: getCenter(b.cornerPoints)
                    }));
                } else {
                    // ----------------------------------------------------
                    // B) ZXing アプローチ (複数検出)
                    // ----------------------------------------------------
                    const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
                    const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
                    const hints = new Map();
                    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
                    
                    const results = zxingMultiReader.decodeMultiple(binaryBitmap, hints);
                    detectedItems = results.map(r => {
                        const pts = r.getResultPoints().map(p => ({ x: p.getX(), y: p.getY() }));
                        return {
                            text: r.getText(),
                            points: pts,
                            center: getCenter(pts)
                        };
                    });
                }
            } catch (err) {
                // ZXingはQRが見つからないと NotFoundException を投げるため握りつぶす
            }

            // 検出結果の幾何判定
            processDetections(detectedItems);
            
            // 枠線を再描画
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
            if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

            isProcessing = false;
        }

        // 次のフレームへ
        requestAnimationFrame(scanLoop);
    }

    // 「同一か、別物か」を判定するコアロジック
    function processDetections(items) {
        if (items.length === 0) return;
        
        // 判定閾値: フレーム幅の25%以上離れていれば「別QR」とみなす
        const distanceThreshold = canvas.width * 0.25;

        for (const item of items) {
            if (!firstQR) {
                // 1個目を採用
                firstQR = item;
                document.getElementById('text1').innerText = item.text;
                continue;
            }

            if (!secondQR) {
                // すでに1個目がある場合、中心距離を測る
                const dist = getDistance(firstQR.center, item.center);
                
                if (dist > distanceThreshold) {
                    // 【判定】中心距離が閾値より大きい ＝「別のコード」として採用
                    secondQR = item;
                    document.getElementById('text2').innerText = item.text;
                    break; 
                } else {
                    // 【判定】距離が近い ＝ 1個目と同じQRを見続けている
                    // 位置情報を最新に更新して枠線がブレに追従するようにする
                    firstQR.points = item.points;
                    firstQR.center = item.center;
                }
            }
        }
    }

    // キャンバスにQRの枠を描画する関数
    function drawBoundingBox(points, color) {
        if (!points || points.length < 3) return;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.closePath();
        ctx.lineWidth = 6;
        ctx.strokeStyle = color;
        ctx.stroke();
        
        // 背景を少し暗くして視認性を上げる
        ctx.fillStyle = color + '33'; // hexに透過アルファを追加
        ctx.fill();
    }

    // リセット処理
    function resetScanner() {
        firstQR = null;
        secondQR = null;
        document.getElementById('text1').innerText = "未検出";
        document.getElementById('text2').innerText = "未検出";
        document.getElementById('resetBtn').style.display = 'none';
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        isScanning = true;
        requestAnimationFrame(scanLoop);
    }

    // 起動
    window.onload = init;

</script>
</body>
</html>
